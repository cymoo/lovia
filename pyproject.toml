[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lovia"
version = "0.1.0"
description = "A lightweight and elegant Agent framework"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "wakenee", email = "wakenee@hotmail.com" }]
keywords = ["agent", "llm", "ai", "framework"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/cymoo/lovia"
Repository = "https://github.com/cymoo/lovia"
