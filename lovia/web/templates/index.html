<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
<script id="app-config" type="application/json">{{ app_config | tojson }}</script>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <span class="sidebar-title">Chats</span>
    <div class="sidebar-head-actions">
      <button id="sidebar-collapse" class="btn-icon sidebar-collapse-btn" type="button" title="Collapse sidebar" aria-label="Collapse sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
      <button id="new-chat" class="btn-icon" type="button" title="New chat" aria-label="New chat"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg></button>
    </div>
  </div>
  <div class="agent-switcher" id="agent-switcher">
    <label class="agent-label" for="agent-select">Agent</label>
    <select id="agent-select" class="agent-select" aria-label="Select agent"></select>
  </div>
  <div class="sidebar-search">
    <input type="search" id="session-search" class="search-input" placeholder="Filter…" autocomplete="off" />
  </div>
  <nav id="sessions-list" class="sessions-list" aria-label="Chat sessions"></nav>
</aside>

<!-- Main -->
<main class="page">
  <header class="topbar">
    <button id="sidebar-expand" class="btn-icon sidebar-expand-btn" type="button" title="Show sidebar" aria-label="Show sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>
    <button id="sidebar-toggle" class="btn-icon hamburger-btn" type="button" aria-label="Toggle sidebar">
      <span class="hamburger"></span>
    </button>
    <h1 id="chat-title" class="chat-title">New chat</h1>
    <div class="topbar-actions">
      <span id="turn-progress" class="turn-progress hidden"></span>
      <div class="export-wrap" id="export-wrap" style="display:none">
        <button id="export-btn" class="btn btn-ghost btn-sm" type="button" title="Export chat" aria-haspopup="menu" aria-expanded="false"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>Export</button>
        <div class="export-menu" id="export-menu" role="menu" hidden>
          <button type="button" class="export-menu-item" role="menuitem" data-format="md">Markdown</button>
          <button type="button" class="export-menu-item" role="menuitem" data-format="html">HTML</button>
        </div>
      </div>
      <button id="schedules-btn" class="btn-icon hidden" type="button" title="Scheduled runs" aria-label="Scheduled runs">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button id="dark-toggle" class="btn-icon" type="button" title="Toggle theme" aria-label="Toggle dark mode">
        <span class="theme-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
      </button>
    </div>
  </header>

  <div id="chat-region" class="chat-region">
    <section id="transcript" class="transcript" aria-live="polite">
      <div class="empty-state" id="empty-state">
        <h2>{{ empty_title }}</h2>
        {% if empty_description is string %}
        <p>{{ empty_description }}</p>
        {% else %}
        <ul>
          {% for item in empty_description %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
        {% endif %}
      </div>
    </section>
    <aside id="todo-panel" class="todo-panel hidden" aria-label="Current plan" aria-live="polite"></aside>
    <button id="scroll-bottom" class="scroll-bottom-btn" type="button" aria-label="Scroll to latest" title="Scroll to latest">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
    </button>
  </div>

  <form id="composer" class="composer" autocomplete="off">
    <div class="composer-inner">
      <label class="vh" for="prompt">message</label>
      <textarea id="prompt" name="prompt" rows="1" placeholder="Send a message…" required></textarea>
      <button id="send" class="btn btn-primary" type="submit" aria-label="Send">Send</button>
      <button id="stop" class="btn btn-danger" type="button" aria-label="Stop" style="display:none">Stop</button>
    </div>
  </form>
</main>

<!-- Templates -->
<template id="tmpl-turn">
  <article class="turn">
    <div class="bubble"></div>
  </article>
</template>

<template id="tmpl-tool">
  <details class="tool">
    <summary>
      <span class="tool-name"></span>
      <span class="tool-args"></span>
    </summary>
    <pre class="tool-result"></pre>
  </details>
</template>

<template id="tmpl-approval">
  <div class="approval">
    <div class="approval-head">Awaiting your decision</div>
    <div class="approval-call">
      <code class="approval-name"></code>
      <pre class="approval-args"></pre>
    </div>
    <div class="approval-actions">
      <button type="button" class="btn btn-ghost decline">Deny</button>
      <button type="button" class="btn btn-primary approve">Approve</button>
    </div>
  </div>
</template>

<template id="tmpl-handoff">
  <div class="handoff-banner">
    <span class="handoff-text"></span>
  </div>
</template>

<template id="tmpl-context-compacted">
  <div class="context-notice">
    <div class="context-row">
      <svg class="context-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
        <line x1="14" y1="10" x2="21" y2="3"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      <span class="context-title">Context compacted</span>
      <span class="context-trigger"></span>
    </div>
    <div class="context-stats"></div>
    <div class="context-detail"></div>
  </div>
</template>

<template id="tmpl-copy-btn">
  <button type="button" class="btn-copy" title="Copy as Markdown" aria-label="Copy message">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
      <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
    </svg>
  </button>
</template>

<template id="tmpl-retry">
  <div class="retry-row">
    <button type="button" class="btn btn-ghost btn-sm retry-btn">Retry</button>
  </div>
</template>

<template id="tmpl-skeleton">
  <div class="chat-skeleton" aria-hidden="true">
    <div class="skeleton-turn user"><span class="skeleton-line" style="width:36%"></span></div>
    <div class="skeleton-turn">
      <span class="skeleton-line" style="width:72%"></span>
      <span class="skeleton-line" style="width:90%"></span>
      <span class="skeleton-line" style="width:58%"></span>
    </div>
    <div class="skeleton-turn user"><span class="skeleton-line" style="width:28%"></span></div>
    <div class="skeleton-turn">
      <span class="skeleton-line" style="width:80%"></span>
      <span class="skeleton-line" style="width:50%"></span>
    </div>
  </div>
</template>

<script type="module" src="{{ url_for('static', path='js/main.js') }}"></script>
</body>
</html>
