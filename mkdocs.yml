site_name: lovia
site_description: A lightweight and elegant Agent framework
site_url: https://cymoo.github.io/lovia/
site_author: wakenee
copyright: Copyright &copy; wakenee — MIT License

repo_name: cymoo/lovia
repo_url: https://github.com/cymoo/lovia
edit_uri: edit/main/docs/

docs_dir: docs
exclude_docs: |
  ratio-calibration.md
hooks:
  - scripts/mkdocs_hooks.py
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          # nav labels are static strings from `nav:`, so translate them for the
          # zh build. Values mirror each page's own H1 for consistency; MCP and
          # HTTP API are identical in both languages and left untranslated.
          nav_translations:
            Home: 首页
            Getting started: 快速开始
            Installation: 安装
            Quickstart: 快速上手
            Core concepts: 核心概念
            Core: 核心
            Agents: Agent
            Running agents: 运行 Agent
            Streaming: 流式输出
            Tools: 工具
            Built-in tools: 内置工具
            Structured output: 结构化输出
            Providers & models: Provider 与模型
            Multi-agent: 多 Agent
            Plugins: 插件
            Basics: 基础
            Todo: Todo
            Skills: Skills
            Memory: 记忆
            Production: 生产
            Sessions & checkpoints: Session 与 Checkpoint
            Context management: 上下文管理
            Guardrails: 护栏
            Provider retries: Provider 重试
            Budgets & limits: 预算与限制
            Cancellation & steering: 取消与运行中引导
            Deployment: 生产部署
            Observability: 可观测性
            Workspace: 工作区
            Serving: 服务
            Web UI: Web UI
            Web server: Web 服务端
            Quality: 质量保障
            Evals: 评测
            Testing: 测试
            Reference: 参考
            API reference: API 参考
            Troubleshooting: 故障排查
            Internals: 内部机制
            Architecture: Architecture（英文）

markdown_extensions:
  - toc:
      permalink: true
      # GitHub-style, Unicode-preserving slugs so the hand-written CJK anchors
      # in the zh docs (e.g. `#记忆如何写入`) resolve on the built site.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Locale-agnostic paths: mkdocs-static-i18n (folder mode) resolves each entry
# against the active language folder — docs/en/… for the default build,
# docs/zh/… for the zh build (falling back to en if a translation is missing).
nav:
  - Home: README.md
  - Getting started:
      - Installation: installation.md
      - Quickstart: quickstart.md
      - Core concepts: concepts.md
  - Core:
      - Agents: agents.md
      - Running agents: running.md
      - Providers & models: providers.md
      - Tools: tools.md
      - Built-in tools: built-in-tools.md
      - Structured output: structured-output.md
      - Streaming: streaming.md
      - Multi-agent: multi-agent.md
      - Context management: context.md
      - Workspace: workspace.md
      - Observability: observability.md
  - Plugins:
      - Basics: plugins.md
      - Todo: todo.md
      - Skills: skills.md
      - MCP: mcp.md
      - Memory: memory.md
  - Production:
      - Provider retries: retries.md
      - Budgets & limits: budgets.md
      - Cancellation & steering: cancellation.md
      - Sessions & checkpoints: sessions-and-checkpoints.md
      - Guardrails: guardrails.md
      - Deployment: deployment.md
  - Serving:
      - Web UI: web-ui.md
      - Web server: web-server.md
      - HTTP API: http-api.md
  - Quality:
      - Testing: testing.md
      - Evals: eval.md
  - Reference:
      - API reference: api-reference.md
      - Troubleshooting: troubleshooting.md
  - Internals:
      - Architecture: architecture.md
