name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual re-deploy of the docs site without a new commit

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --extra mcp --extra web --extra ddg
      - name: Ruff
        run: uv run ruff check lovia tests
      - name: Mypy (strict)
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev --extra mcp --extra web --extra ddg
      - name: Pytest
        run: uv run pytest

  # Validate the docs build on pull requests so broken links and anchors are
  # caught before merge. No deployment here (that is the `docs` job below), so
  # this stays off the github-pages environment and its branch policy.
  docs-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        # Extras back the modules that doc snippets import (lovia.web, .plugins.mcp,
        # .tools.search); the snippet checker imports them for real to verify symbols.
        run: uv sync --extra docs --extra mcp --extra web --extra ddg
      - name: Build site (strict)
        run: uv run mkdocs build --strict
      - name: Check links, anchors, and snippets
        run: uv run python scripts/check_docs.py

  # Build the MkDocs site and upload it as the Pages artifact. Split from the
  # deploy job so a failed deploy can be re-run on its own without re-uploading
  # a second `github-pages` artifact (which makes deploy-pages fail with
  # "Multiple artifacts named github-pages"). Runs on main pushes and on manual
  # dispatch; PR validation is handled by `docs-check` above.
  docs:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        # Extras back the modules that doc snippets import (lovia.web, .plugins.mcp,
        # .tools.search); the snippet checker imports them for real to verify symbols.
        run: uv sync --extra docs --extra mcp --extra web --extra ddg
      - name: Build site (strict)
        run: uv run mkdocs build --strict
      - name: Check links, anchors, and snippets
        run: uv run python scripts/check_docs.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Publish the uploaded artifact to GitHub Pages. Isolated so re-running only
  # this job never produces a duplicate artifact. The github-pages environment's
  # branch policy rejects non-main refs, so it inherits the gating via `needs`.
  deploy:
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Only the latest docs build matters, so cancel any queued/in-flight deploy
    # rather than letting back-to-back pushes race in the Pages backend (which
    # surfaces as a flaky "Deployment failed, try again later").
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
