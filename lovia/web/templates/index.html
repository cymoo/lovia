<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0d0e12" media="(prefers-color-scheme: dark)" />
  <title>{{ title }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}" />
  <script>
    // Apply the saved (or OS) theme before first paint — without this, dark-
    // mode users get a white flash on every load. Key mirrors js/store.js.
    try {
      var t = localStorage.getItem('lovia-theme');
      if (t !== 'light' && t !== 'dark') { // unset or 'system' → follow the OS
        t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) { /* no storage access: keep the light default */ }
  </script>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
  <!-- Renderers (markdown / sanitizer / syntax highlight / diagrams),
       vendored under static/vendor (exact versions + licenses in its
       README). Self-hosted so the UI needs no CDN or font origin — it works
       on intranets and behind firewalls. `integrity` guards against
       corrupted/tampered vendor files; tests/web/test_vendor_integrity.py
       keeps these hashes, the files, and the README manifest in sync.
       `defer` keeps the 2.6 MB mermaid bundle off the first paint; all four
       stay optional — if one fails to load (or fails its hash), chat.js
       falls back to escaped plain text and skips highlighting/diagrams
       instead of dying. -->
  <script defer src="{{ url_for('static', path='vendor/purify.min.js') }}" integrity="sha384-JEyTNhjM6R1ElGoJns4U2Ln4ofPcqzSsynQkmEc/KGy6336qAZl70tDLufbkla+3"></script>
  <script defer src="{{ url_for('static', path='vendor/marked.min.js') }}" integrity="sha384-QsSpx6a0USazT7nK7w8qXDgpSAPhFsb2XtpoLFQ5+X2yFN6hvCKnwEzN8M5FWaJb"></script>
  <script defer src="{{ url_for('static', path='vendor/highlight.min.js') }}" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp"></script>
  <script defer src="{{ url_for('static', path='vendor/mermaid.min.js') }}" integrity="sha384-zkWMJO4sgpPUzyuOgDx8HB/K55glbAwajEpk1Go2NWRuPkPA/wIhoEJTuSkmOYrV"></script>
</head>
<body>
<script id="app-config" type="application/json">{{ app_config | tojson }}</script>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <span class="sidebar-title">{{ title }}</span>
    <div class="sidebar-head-actions">
      <button id="sidebar-collapse" class="btn-icon sidebar-collapse-btn" type="button" title="Collapse sidebar" aria-label="Collapse sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
    </div>
  </div>
  <div class="agent-switcher" id="agent-switcher">
    <label class="agent-label" for="agent-select">Agent</label>
    <select id="agent-select" class="agent-select" aria-label="Select agent"></select>
  </div>
  <!-- App-level destinations up top (the ChatGPT/Claude pattern): starting a
       chat, what the agent remembers, what it runs on a schedule. All
       cross-chat concerns — the per-chat topbar stays chat-scoped. -->
  <nav class="sidebar-nav" aria-label="App">
    <button id="new-chat" class="sidebar-nav-item" type="button" title="New chat" aria-label="New chat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
      <span>New chat</span>
    </button>
    <button id="memory-btn" class="sidebar-nav-item hidden" type="button" title="What the agent remembers about you" aria-haspopup="dialog">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg>
      <span>Memory</span>
    </button>
    <button id="schedules-btn" class="sidebar-nav-item hidden" type="button" title="Runs on a schedule" aria-haspopup="dialog">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Scheduled runs</span>
    </button>
    <button id="settings-btn" class="sidebar-nav-item" type="button" title="Settings" aria-haspopup="dialog">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>Settings</span>
    </button>
  </nav>
  <div class="sidebar-section-label">Chats</div>
  <div class="sidebar-search">
    <input type="search" id="session-search" class="search-input" placeholder="Filter…" aria-label="Filter chats" autocomplete="off" />
  </div>
  <nav id="sessions-list" class="sessions-list" aria-label="Chat sessions"></nav>
</aside>

<!-- Main -->
<main class="page">
<div class="chat-main">
  <header class="topbar">
    <button id="sidebar-expand" class="btn-icon sidebar-expand-btn" type="button" title="Show sidebar" aria-label="Show sidebar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>
    <button id="sidebar-toggle" class="btn-icon hamburger-btn" type="button" aria-label="Toggle sidebar">
      <span class="hamburger"></span>
    </button>
    <h1 id="chat-title" class="chat-title">New chat</h1>
    <div class="topbar-actions">
      <span id="turn-progress" class="turn-progress hidden"></span>
      <!-- Context fill: appears once a turn reports usage and the agent's
           window is known; details live in the tooltip. -->
      <span id="context-meter" class="context-meter hidden" role="img" aria-label="Context usage">
        <span class="context-meter-track"><span class="context-meter-fill"></span></span>
        <span class="context-meter-label"></span>
      </span>
      <div class="export-wrap" id="export-wrap" style="display:none">
        <button id="export-btn" class="btn btn-ghost btn-sm" type="button" title="Export chat" aria-haspopup="menu" aria-expanded="false"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>Export</button>
        <div class="export-menu" id="export-menu" role="menu" hidden>
          <button type="button" class="export-menu-item" role="menuitem" data-format="md">Markdown</button>
          <button type="button" class="export-menu-item" role="menuitem" data-format="html">HTML</button>
          <button type="button" class="export-menu-item" role="menuitem" data-format="json">JSON</button>
          <button type="button" class="export-menu-item" role="menuitem" data-format="txt">Text</button>
        </div>
      </div>
      <button id="dark-toggle" class="btn-icon" type="button" title="Toggle theme" aria-label="Toggle dark mode">
        <span class="theme-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
      </button>
      <!-- Rightmost: the toggle sits next to the panel it opens. -->
      <button id="files-btn" class="btn-icon hidden" type="button" title="Files" aria-label="Workspace files" aria-expanded="false" aria-controls="files-panel">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
      </button>
    </div>
  </header>

  <div id="chat-region" class="chat-region">
    <section id="transcript" class="transcript" aria-live="polite">
      <div class="empty-state" id="empty-state">
        <h2>{{ empty_title }}</h2>
        {% if empty_description is string %}
        <p>{{ empty_description }}</p>
        {% else %}
        <ul>
          {% for item in empty_description %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
        {% endif %}
        {% if empty_examples %}
        <div class="empty-examples">
          {% for example in empty_examples %}
          <button type="button" class="empty-example">{{ example }}</button>
          {% endfor %}
        </div>
        {% endif %}
      </div>
    </section>
    <aside id="todo-panel" class="todo-panel hidden" aria-label="Current plan" aria-live="polite"></aside>
    <button id="scroll-bottom" class="scroll-bottom-btn" type="button" aria-label="Scroll to latest" title="Scroll to latest">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
    </button>
  </div>

  <form id="composer" class="composer" autocomplete="off">
    <div class="composer-inner">
      <label class="vh" for="prompt">message</label>
      <textarea id="prompt" name="prompt" rows="1" placeholder="Send a message…"></textarea>
      <button id="stop" class="btn btn-danger" type="button" aria-label="Stop" style="display:none">Stop</button>
      <button id="send" class="btn-send" type="submit" aria-label="Send message" title="Send (Enter)" disabled>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
      </button>
    </div>
  </form>
</div>

<!-- Files panel — read-only window into the agent's workspace -->
<aside id="files-panel" class="files-panel" aria-label="Workspace files">
  <div id="files-resizer" class="files-resizer" role="separator" aria-orientation="vertical" aria-label="Resize files panel (arrow keys; double-click resets)" aria-controls="files-panel" tabindex="0"></div>
  <div class="files-head">
    <div class="files-tabs" role="tablist" aria-label="File view">
      <button id="files-tab-recent" class="files-tab active" type="button" role="tab" aria-selected="true">Recent</button>
      <button id="files-tab-browse" class="files-tab" type="button" role="tab" aria-selected="false">Browse</button>
    </div>
    <div class="files-head-actions">
      <button id="files-refresh" class="btn-icon" type="button" title="Refresh" aria-label="Refresh files"></button>
      <button id="files-close" class="btn-icon" type="button" title="Close" aria-label="Close files panel"></button>
    </div>
  </div>
  <nav id="files-crumbs" class="files-crumbs hidden" aria-label="Directory path"></nav>
  <div class="files-search">
    <input type="search" id="files-filter" class="search-input" placeholder="Filter files…" aria-label="Filter files" autocomplete="off" />
  </div>
  <div id="files-list" class="files-list"></div>
  <div id="files-split" class="files-split hidden" role="separator" aria-orientation="horizontal" aria-label="Resize file preview (arrow keys; double-click resets)" aria-controls="files-viewer" aria-valuemin="0" aria-valuemax="100" aria-valuenow="58" tabindex="0"></div>
  <section id="files-viewer" class="files-viewer hidden" aria-label="File preview">
    <div class="files-viewer-head">
      <span id="files-viewer-name" class="files-viewer-name" title=""></span>
      <div class="files-viewer-actions">
        <button id="files-md-toggle" class="btn-icon hidden" type="button" title="Toggle rendered / raw" aria-label="Toggle rendered or raw markdown"></button>
        <button id="files-wrap-toggle" class="btn-icon hidden" type="button" title="Toggle line wrap" aria-label="Toggle line wrap"></button>
        <button id="files-copy-path" class="btn-icon" type="button" title="Copy path" aria-label="Copy file path"></button>
        <a id="files-download" class="btn-icon" title="Download" aria-label="Download file" download></a>
        <button id="files-viewer-close" class="btn-icon" type="button" title="Close file" aria-label="Close file preview"></button>
      </div>
    </div>
    <div id="files-viewer-body" class="files-viewer-body"></div>
  </section>
</aside>
</main>

<!-- Templates -->
<template id="tmpl-turn">
  <article class="turn">
    <div class="bubble"></div>
  </article>
</template>

<template id="tmpl-tool">
  <details class="tool">
    <summary>
      <span class="tool-name"></span>
      <span class="tool-args"></span>
    </summary>
    <div class="tool-params"></div>
    <div class="tool-result-box">
      <pre class="tool-result"></pre>
    </div>
  </details>
</template>

<template id="tmpl-approval">
  <div class="approval">
    <div class="approval-head">Awaiting your decision</div>
    <div class="approval-call">
      <code class="approval-name"></code>
      <div class="approval-args tool-params"></div>
    </div>
    <div class="approval-actions">
      <button type="button" class="btn btn-ghost decline">Deny</button>
      <button type="button" class="btn btn-primary approve">Approve</button>
    </div>
  </div>
</template>

<template id="tmpl-handoff">
  <div class="handoff-banner">
    <span class="handoff-text"></span>
  </div>
</template>

<template id="tmpl-context-compacted">
  <div class="context-notice">
    <div class="context-row">
      <svg class="context-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
        <line x1="14" y1="10" x2="21" y2="3"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      <span class="context-title">Context compacted</span>
      <span class="context-trigger"></span>
    </div>
    <div class="context-stats"></div>
    <div class="context-detail"></div>
  </div>
</template>

<template id="tmpl-copy-btn">
  <button type="button" class="btn-copy" title="Copy as Markdown" aria-label="Copy message">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
      <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
    </svg>
  </button>
</template>

<template id="tmpl-retry">
  <div class="retry-row">
    <button type="button" class="btn btn-ghost btn-sm retry-btn">Retry</button>
  </div>
</template>

<template id="tmpl-skeleton">
  <div class="chat-skeleton" aria-hidden="true">
    <div class="skeleton-turn user"><span class="skeleton-line" style="width:36%"></span></div>
    <div class="skeleton-turn">
      <span class="skeleton-line" style="width:72%"></span>
      <span class="skeleton-line" style="width:90%"></span>
      <span class="skeleton-line" style="width:58%"></span>
    </div>
    <div class="skeleton-turn user"><span class="skeleton-line" style="width:28%"></span></div>
    <div class="skeleton-turn">
      <span class="skeleton-line" style="width:80%"></span>
      <span class="skeleton-line" style="width:50%"></span>
    </div>
  </div>
</template>

<script type="module" src="{{ url_for('static', path='js/main.js') }}"></script>
</body>
</html>
